[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-merge-conflict" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "jupytext-sync", name = "sync jupytext notebooks", language = "system", entry = "bash -c 'shopt -s nullglob; for nb in *.ipynb; do jupytext --sync \"$nb\"; done'", always_run = true, pass_filenames = false },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.7"
hooks = [
  { id = "ruff", args = ["--fix"] },
  { id = "ruff-format" },
]
